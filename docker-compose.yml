version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pricing_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - SPREADSHEET_NAME=Precificacao_Marketplaces
      - ENV=development
    networks:
      - pricing_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pricing_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - pricing_network
    command: npm run dev

networks:
  pricing_network:
    driver: bridge
